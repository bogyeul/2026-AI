function parseCSV(t){const R=[];let row=[],c='',q=false;
 for(let i=0;i<t.length;i++){const ch=t[i];
  if(q){if(ch==='"'){if(t[i+1]==='"'){c+='"';i++}else q=false}else c+=ch}
  else{if(ch==='"')q=true;else if(ch===','){row.push(c);c=''}else if(ch==='\n'){row.push(c);R.push(row);row=[];c=''}else if(ch!=='\r')c+=ch}}
 if(c!==''||row.length){row.push(c);R.push(row)}return R.filter(r=>r.length>1&&r.some(v=>v.trim()!==''));}

async function load(showToast){
 const btn=$('rf');btn.classList.add('spin');
 try{
  if(!CFG.CSV) throw 0;
  const res=await fetch(CFG.CSV+(CFG.CSV.includes('?')?'&':'?')+'cb='+Date.now());
  if(!res.ok) throw 0;
  const rows=parseCSV(await res.text());
  const head=rows[0].map(h=>h.trim());
  const col=cs=>{for(const c of cs){const i=head.indexOf(c);if(i>=0)return i}return -1};
  const ci={id:col(['ID','id','No']),cat:col(['구분','대분류']),name:col(['내용','체크리스트(해야 할 일)','과업','세부 과업']),
   cur:col(['진행계획','현 진행사항','진행사항']),start:col(['시작일']),end:col(['종료일','완료 기한','기한']),
   status:col(['진행현황','상태']),next:col(['진행예정','진행 예정']),owner:col(['담당자','담당']),
   done:col(['수행완료여부','완료여부']),note:col(['비고'])};
  TASKS=rows.slice(1).map(r=>{const g=i=>i>=0?(r[i]||'').trim():'';
   const st=normSt(g(ci.status));const done=g(ci.done).replace(/\s/g,'')==='완료'||st==='완료';
   return{id:g(ci.id),cat:g(ci.cat)||'기타',name:g(ci.name),cur:g(ci.cur),next:g(ci.next),note:g(ci.note),
    owner:g(ci.owner),end:g(ci.end),start:g(ci.start),due:g(ci.end),st,done,urgent:/긴급/.test(g(ci.note))}})
   .filter(t=>t.id&&t.name);
  applyPending();
  sync('시트 동기화 · '+time());
  if(showToast)toast('최신 데이터를 불러왔어요');
 }catch(e){
  if(!TASKS.length){TASKS=FALLBACK.map(t=>Object.assign({},t,{due:t.end}));}
  sync('시트 연결 실패 · 내장 데이터 표시 (CONFIG 확인)',true);
  if(showToast)toast('시트를 불러오지 못했어요');
 }
 try{if(CFG.BUDGET){const r=await fetch(CFG.BUDGET+(CFG.BUDGET.includes('?')?'&':'?')+'cb='+Date.now());if(r.ok){const rw=parseCSV(await r.text());const h=rw[0].map(x=>x.trim());const col=cs=>{for(const c of cs){const i=h.indexOf(c);if(i>=0)return i}return -1};const bi={cat:col(['구분','대분류']),item:col(['항목','내용']),plan:col(['예산','금액']),spent:col(['집행','집행액'])};const parsed=rw.slice(1).map(r=>({cat:(r[bi.cat]||'').trim(),item:(r[bi.item]||'').trim(),plan:num(r[bi.plan]),spent:num(r[bi.spent])})).filter(b=>b.item&&b.plan);if(parsed.length)BUDGET=parsed;}}}catch(e){}
 btn.classList.remove('spin');render();
}
function applyPending(){Object.keys(pending).forEach(id=>{const t=TASKS.find(x=>x.id===id);if(!t){return}
 const p=pending[id];const cur=t.done?'완료':'미완료',want=p.done?'완료':'미완료';
 if(cur===want){delete pending[id]}else{t.done=p.done;t.st=p.done?'완료':(p.prev||t.st)}});}

function toggle(id,ev){if(ev)ev.stopPropagation();const t=TASKS.find(x=>x.id===id);if(!t)return;
 let status,doneVal;
 if(t.done){const prev=prevStatus[id]||'진행중';t.done=false;t.st=prev;status=prev;doneVal='미완료';pending[id]={done:false,prev:prev}}
 else{prevStatus[id]=t.st;t.done=true;t.st='완료';status='완료';doneVal='완료';pending[id]={done:true,prev:prevStatus[id]}}
 writeSheet(id,{'수행완료여부':doneVal,'진행현황':status});render();}
function writeSheet(id,values){
 if(!CFG.SCRIPT){toast('SCRIPT_URL 미설정 · 화면에만 반영');return}
 fetch(CFG.SCRIPT,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},
  body:JSON.stringify({id:id,values:values})}).then(()=>toast('시트에 기록했어요')).catch(()=>toast('기록 실패 · 네트워크 확인'));}

function render(){
 const tot=TASKS.length||1,dn=TASKS.filter(t=>t.done).length;
 $('d1').textContent=dday(2026,7,31);$('d2').textContent=dday(2026,10,17);
 $('pct').textContent=Math.round(dn/tot*100)+'%';
 const C={'완료':0,'진행중':0,'대기':0,'리스크':0};TASKS.forEach(t=>{C[t.done?'완료':t.st]=(C[t.done?'완료':t.st]||0)+1});
 const chips=[['전체',TASKS.length,'all',''],['완료',C['완료'],'done','완료'],['진행중',C['진행중'],'doing','진행중'],['대기',C['대기'],'wait','대기'],['리스크',C['리스크'],'risk','리스크']];
 $('kpis').innerHTML=chips.map(c=>`<div class="kpi k-${c[2]} ${((c[3]===''&&!fSt)||fSt===c[3]&&c[3]!=='')?'on':''}" data-st="${c[3]}"><div class="n">${c[1]}</div><div class="l">${c[0]}</div></div>`).join('');
 $('kpis').querySelectorAll('.kpi').forEach(e=>e.onclick=()=>{const v=e.dataset.st;fSt=(v===''||fSt===v)?null:v;render()});
 const cats=[...new Set(TASKS.map(t=>t.cat))];
 $('catsum').textContent=dn+'/'+TASKS.length+' 완료';
 $('board').innerHTML=cats.map(c=>{const L=TASKS.filter(t=>t.cat===c),d=L.filter(t=>t.done).length,rk=L.some(t=>t.st==='리스크'&&!t.done),p=Math.round(d/L.length*100);
  return `<div class="crow ${fCat===c?'on':''} ${rk?'hasrisk':''}" data-c="${esc(c)}"><span class="cname">${esc(c)}</span><span class="cbar"><i class="cfill" style="width:${p}%"></i></span><span class="ccnt">${d}/${L.length}</span><span class="cdot"></span></div>`}).join('');
 $('board').querySelectorAll('.crow').forEach(e=>e.onclick=()=>{fCat=fCat===e.dataset.c?null:e.dataset.c;render()});
 const bc={},sc={};BUDGET.forEach(b=>{bc[b.cat]=(bc[b.cat]||0)+b.plan;sc[b.cat]=(sc[b.cat]||0)+b.spent});
 const plan=BUDGET.reduce((a,b)=>a+b.plan,0),spent=BUDGET.reduce((a,b)=>a+b.spent,0);
 $('bspent').textContent=(spent/1e8).toFixed(2)+'억';$('bpct').textContent=(plan?Math.round(spent/plan*100):0)+'%';$('bfill').style.width=(plan?spent/plan*100:0)+'%';
 $('brows').innerHTML=Object.keys(bc).sort().map(k=>{const pc=bc[k]?Math.round((sc[k]||0)/bc[k]*100):0;
  return `<div class="brow"><span class="bn">${k.replace(/^\d+\./,'')}</span><span class="bb"><i style="width:${pc}%"></i></span><span class="bv">${Math.round(bc[k]/1e4).toLocaleString()}만</span></div>`}).join('');
 let S=TASKS.slice();if(fCat)S=S.filter(t=>t.cat===fCat);if(fSt)S=S.filter(t=>(t.done?'완료':t.st)===fSt);
 $('rtitle').textContent=(fCat||'전체 과업')+(fSt?' · '+fSt:'');$('rcount').textContent=S.length+'건';
 const row=t=>{const sc=SC[t.done?'완료':t.st];const meta=(t.owner||'미지정')+(t.end?' · ~'+t.end.slice(5).replace('.','/'):(/상시|진행/.test(t.due||'')?' · 상시':''));
  return `<div class="trow${t.done?' done':''}"><button class="cbx${t.done?' on':''}" onclick="toggle('${t.id}',event)" aria-label="완료 토글"><svg viewBox="0 0 24 24"><path d="M4.5 12.5l5 5 10-11"/></svg></button>`
   +`<div class="tmid" onclick="tg('${t.id}')"><div class="tnm">${t.urgent?'<span class="urg">긴급</span>':''}${esc(t.name)}</div><div class="tmeta">${esc(meta)}</div></div>`
   +`<span class="pill ${sc}">${t.done?'완료':t.st}</span></div>`
   +`<div class="tdet" id="det-${t.id}">${t.cur?'<div><b>진행</b>'+esc(t.cur)+'</div>':''}${t.next?'<div><b>예정</b>'+esc(t.next)+'</div>':''}${t.note?'<div><b>비고</b>'+esc(t.note)+'</div>':''}</div>`};
 let html;
 if(fCat){html=S.map(row).join('')||empty()}
 else{const g={};S.forEach(t=>{(g[t.cat]=g[t.cat]||[]).push(t)});html=cats.filter(c=>g[c]).map(c=>`<div class="grp">${esc(c)} · ${g[c].filter(t=>t.done).length}/${g[c].length}</div>`+g[c].map(row).join('')).join('')||empty()}
 $('list').innerHTML=html;}
function empty(){return '<div style="padding:30px;text-align:center;color:#94a3b8">해당 과업이 없어요</div>'}
function tg(id){const d=$('det-'+id);if(d)d.classList.toggle('show')}

$('rf').onclick=()=>load(true);$('rf2').onclick=()=>load(true);
setInterval(()=>load(false),5*60*1000);
load(false);
</script></body></html>
